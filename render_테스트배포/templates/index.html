<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>법인 월간자료 취합 플랫폼 · {{ month }}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root{--bg:#E8EEF5;--tx:#334155;--mut:#64748b;--acc:#38bdf8;--dk:#041527;--nv:#002D4B;--cy:#009AB8;--lm:#B8D544;
--gl:rgba(255,255,255,.45);--gli:rgba(255,255,255,.6);--gb:rgba(255,255,255,.8);--sh:0 16px 40px rgba(15,23,42,.08);--gn:#5b9e1b;--gr:#c2cbd6;--am:#d97706;}
*{box-sizing:border-box}body{margin:0;font-family:'Pretendard','Malgun Gothic',sans-serif;color:var(--tx);background:var(--bg);min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden}.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.6;animation:f 20s infinite ease-in-out alternate}
.b1{width:420px;height:420px;background:var(--nv);top:-80px;left:-60px}.b2{width:480px;height:480px;background:var(--cy);bottom:-120px;right:-80px}
.b3{width:360px;height:360px;background:var(--lm);opacity:.4;top:-60px;right:10%}.b4{width:340px;height:340px;background:var(--acc);opacity:.5;bottom:5%;left:8%}
@keyframes f{from{transform:translate(0,0)}to{transform:translate(30px,40px)}}
.wrap{max-width:1180px;margin:0 auto;padding:32px 24px 64px}
header{display:flex;align-items:center;gap:18px;margin-bottom:8px}header img{height:44px}
.ttl b{font-size:24px;font-weight:800;color:var(--dk)}.ttl span{display:block;font-size:13px;color:var(--mut);margin-top:2px}
.mb{margin-left:auto;background:var(--gl);border:1px solid var(--gb);backdrop-filter:blur(20px);padding:8px 16px;border-radius:14px;font-weight:600;color:var(--nv)}
.ov{background:var(--gl);border:1px solid var(--gb);backdrop-filter:blur(20px);border-radius:24px;box-shadow:var(--sh);padding:22px 28px;margin:18px 0 28px;display:flex;align-items:center;gap:24px}
.ob{width:58px;height:58px;border-radius:50%;background:var(--gr);display:flex;align-items:center;justify-content:center;color:#fff;transition:.3s;box-shadow:inset 0 0 0 5px rgba(255,255,255,.55)}
.ob.on{background:var(--gn);box-shadow:0 0 22px rgba(91,158,27,.6)}.ob.partial{background:var(--am)}.ob .material-icons-round{font-size:30px}
.ot b{font-size:18px}.ot span{color:var(--mut);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}@media(max-width:980px){.grid{grid-template-columns:1fr}}
.card{background:var(--gl);border:1px solid var(--gb);backdrop-filter:blur(20px);border-radius:26px;box-shadow:var(--sh);padding:24px;display:flex;flex-direction:column}
.card.complete{outline:2px solid var(--lm)}
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.card-ico{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--gli);color:var(--cy)}.card-ico .material-icons-round{font-size:24px}
.ch b{font-size:16px;font-weight:700;color:var(--dk);display:block}.modetag{font-size:11px;color:var(--mut)}
.countpill{margin-left:auto;font-weight:700;font-size:13px;padding:5px 11px;border-radius:20px;background:var(--gli);color:var(--nv)}.countpill.done{background:var(--gn);color:#fff}
.drop{border:2px dashed var(--cy);border-radius:16px;background:var(--gli);padding:16px;text-align:center;cursor:pointer;transition:.2s;color:var(--mut);font-size:13px}
.drop:hover,.drop.hi{background:rgba(0,154,184,.12)}.drop .material-icons-round{font-size:24px;color:var(--cy);display:block;margin-bottom:4px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}
.chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;background:var(--gli);border-radius:20px;padding:5px 11px;color:var(--mut)}
.chip .dot{width:9px;height:9px;border-radius:50%;background:var(--gr)}.chip.up{color:var(--nv)}.chip.up .dot{background:var(--gn);box-shadow:0 0 6px rgba(91,158,27,.7)}
.foot{margin-top:auto}
.dl{display:block;text-align:center;text-decoration:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;background:var(--gn);color:#fff}
.dl.off{background:var(--gr);pointer-events:none}
.note{font-size:11px;color:var(--am);margin-top:8px}.msg{font-size:12px;margin-top:8px;min-height:15px;color:var(--nv)}
.reset{margin-top:8px;background:transparent;border:1px solid var(--gr);color:var(--mut);border-radius:10px;padding:7px 10px;font-size:11px;cursor:pointer;width:100%}
.testbar{background:#d23;color:#fff;text-align:center;font-weight:700;font-size:13px;padding:9px;letter-spacing:.3px}</style></head><body>
<div class="testbar">⚠ 테스트 환경입니다 · 실제 재무데이터를 올리지 마세요 (더미/가짜 데이터만)</div>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>
<div class="wrap">

<div class="ttl"><b>법인 월간자료 취합 플랫폼</b><span>Monthly Financial Consolidation · 업로드하면 자동 병합되고 누구나 최종본을 내려받습니다</span></div>
<div class="mb">{{ month }}</div></header>
<div class="ov"><div id="ob" class="ob"><span class="material-icons-round">hourglass_top</span></div>
<div class="ot"><b id="ovt">취합 진행 중</b><br><span id="ovs">0 / 3 문서 완료</span></div></div>
<div class="grid" id="grid"></div>
</div>
<script>
const ICON={"경영위원회":"groups","KPI":"insights","연결정산표":"account_balance"};
let built=false;
function card(d){
 const ic=ICON[d.key]||"description";
 const note=d.mode==="single"?'<div class="note">※ 연결정산표는 연결담당 단일 제출(확인 필요)</div>':'';
 return `<div class="card" id="c-${d.key}">
  <div class="card-head"><div class="card-ico"><span class="material-icons-round">${ic}</span></div>
   <div class="ch"><b>${d.label}</b><span class="modetag">${d.mode==="single"?"단일 제출":"법인별 분담"}</span></div>
   <div class="countpill" id="p-${d.key}">0/${d.total}</div></div>
  <div class="drop" data-k="${d.key}"><span class="material-icons-round">cloud_upload</span>내 자료 업로드(.xlsx)<input type="file" accept=".xlsx" multiple hidden></div>
  <div class="chips" id="ch-${d.key}"></div>${note}
  <div class="foot"><a class="dl off" id="dl-${d.key}" href="#">최종본 다운로드</a>
   <div class="msg" id="m-${d.key}"></div>
   <button class="reset" id="r-${d.key}">이 문서 초기화</button></div></div>`;
}
function build(s){
 document.getElementById("grid").innerHTML=s.docs.map(card).join("");
 s.docs.forEach(d=>{
  const c=document.getElementById("c-"+d.key),dp=c.querySelector(".drop"),inp=dp.querySelector("input");
  dp.onclick=()=>inp.click(); inp.onchange=e=>up(d.key,e.target.files);
  ["dragover","dragenter"].forEach(ev=>dp.addEventListener(ev,e=>{e.preventDefault();dp.classList.add("hi")}));
  ["dragleave","drop"].forEach(ev=>dp.addEventListener(ev,e=>{e.preventDefault();dp.classList.remove("hi")}));
  dp.addEventListener("drop",e=>up(d.key,e.dataTransfer.files));
  document.getElementById("r-"+d.key).onclick=()=>rs(d.key);
 });
 built=true;
}
function upd(s){
 s.docs.forEach(d=>{
  document.getElementById("ch-"+d.key).innerHTML=d.rows.map(r=>`<span class="chip ${r.uploaded?'up':''}"><span class="dot"></span>${r.uploader}</span>`).join("");
  const p=document.getElementById("p-"+d.key);p.textContent=d.done+"/"+d.total;p.classList.toggle("done",d.all_done);
  document.getElementById("c-"+d.key).classList.toggle("complete",d.all_done);
  const dl=document.getElementById("dl-"+d.key);
  if(d.master){dl.classList.remove("off");dl.href="/download/"+encodeURIComponent(d.key);dl.textContent="최종본 다운로드";}
  else{dl.classList.add("off");dl.href="#";dl.textContent="최종본 준비 전";}
 });
 const ob=document.getElementById("ob");
 ob.className="ob"+(s.all_done?" on":(s.done_docs>0?" partial":""));
 ob.innerHTML=`<span class="material-icons-round">${s.all_done?'check':'hourglass_top'}</span>`;
 document.getElementById("ovt").textContent=s.all_done?"전체 취합 완료":"취합 진행 중";
 document.getElementById("ovs").textContent=s.done_docs+" / "+s.total_docs+" 문서 완료";
}
async function refresh(){const s=await(await fetch("/status")).json();if(!built)build(s);upd(s);}
async function up(k,files){const m=document.getElementById("m-"+k);
 for(const f of files){const fd=new FormData();fd.append("file",f);
  m.textContent="업로드 중...";
  const r=await(await fetch("/upload/"+encodeURIComponent(k),{method:"POST",body:fd})).json();
  if(r.ok){m.textContent=r.uploader+" 업로드 완료"+(r.merged?" · 자동 병합됨":"");upd(r.status);}else{m.textContent="⚠ "+r.msg;}}}
async function rs(k){const r=await(await fetch("/reset/"+encodeURIComponent(k),{method:"POST"})).json();upd(r.status);document.getElementById("m-"+k).textContent="초기화됨";}
refresh();
</script></body></html>
